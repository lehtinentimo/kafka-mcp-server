version: 2
updates:
  # Keep npm dependencies up to date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Optional: reduce noise; remove if you want all updates including majors
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions up to date (if you use Actions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
